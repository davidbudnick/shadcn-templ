name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The race detector recompiles the whole tree (incl. the stdlib) and
        # dominates CI time. Race bugs aren't Go-version-specific, so run -race
        # only on the latest version; the floor version runs a plain (fast) test.
        include:
          - go-version: "1.25"
          - go-version: "1.26"
            race: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Generate templ
        run: templ generate

      - name: Verify generated code is up to date
        run: git diff --exit-code

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ${{ matrix.race && '-race' || '' }} -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage total
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
